<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Evntra logo">
  <rect width="64" height="64" rx="14" fill="#0d1a0f"/>
  <!-- Connection lines -->
  <line x1="32" y1="32" x2="16" y2="20" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="32" x2="48" y2="20" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="32" x2="16" y2="46" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="32" x2="48" y2="46" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="32" x2="32" y2="14" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="20" r="4.5" fill="#27ae60" stroke="#2ecc71" stroke-width="1.5"/>
  <circle cx="48" cy="20" r="4.5" fill="#27ae60" stroke="#2ecc71" stroke-width="1.5"/>
  <circle cx="16" cy="46" r="4.5" fill="#27ae60" stroke="#2ecc71" stroke-width="1.5"/>
  <circle cx="48" cy="46" r="4.5" fill="#27ae60" stroke="#2ecc71" stroke-width="1.5"/>
  <circle cx="32" cy="14" r="4.5" fill="#27ae60" stroke="#2ecc71" stroke-width="1.5"/>
  <!-- Center node (brighter) -->
  <circle cx="32" cy="32" r="6" fill="#2ecc71" stroke="#39d98a" stroke-width="1.5"/>
  <!-- Glow effect on center -->
  <circle cx="32" cy="32" r="6" fill="none" stroke="#2ecc71" stroke-width="3" opacity="0.25"/>
</svg>
